name: Docker Hub Login

on:
  push:
    branches: [ "main" ]

jobs:
  login:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Build
        run: |
          docker build \
           -t ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:${{ github.sha }} \
           -t ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:latest .
      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:latest
