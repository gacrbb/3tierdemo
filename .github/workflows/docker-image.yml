name: Docker Hub Login

on:
  push:
    branches: [ "main" ]
permissions:
  contents: write
  packages: write

jobs:
  login:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Build
        run: |
          docker build  -t ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:${{ github.sha }} .
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
         image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:${{ github.sha }}
         format: table
         exit-code: 0
         severity: HIGH,CRITICAL
      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pyapp:latest
